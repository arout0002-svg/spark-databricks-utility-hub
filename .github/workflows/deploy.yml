name: Deploy to Databricks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate and normalize Databricks host
        run: |
          if [ -z "${DATABRICKS_HOST}" ]; then
            echo "DATABRICKS_HOST is not set. Configure repository secret DATABRICKS_HOST."
            exit 1
          fi
          if [[ "${DATABRICKS_HOST}" == *'${env.'* ]] || [[ "${DATABRICKS_HOST}" == *'${{'* ]]; then
            echo "DATABRICKS_HOST looks like a placeholder (${DATABRICKS_HOST})."
            echo "Set it to a real workspace URL such as https://adb-1234567890123456.12.azuredatabricks.net"
            exit 1
          fi
          if [[ "${DATABRICKS_HOST}" != https://* ]]; then
            echo "DATABRICKS_HOST is missing https:// prefix; normalizing for this run."
            echo "DATABRICKS_HOST=https://${DATABRICKS_HOST}" >> "${GITHUB_ENV}"
          fi

      - name: Build reusable JAR
        working-directory: jar-utils
        run: ./gradlew clean test build --no-daemon

      - name: Upload JAR to DBFS
        run: |
          databricks fs cp jar-utils/build/libs/project-utils.jar dbfs:/FileStore/jars/project-utils.jar --overwrite

      - name: Validate Databricks bundle
        run: databricks bundle validate -t dev

      - name: Deploy Databricks bundle
        run: databricks bundle deploy -t dev

      - name: Run crypto market analysis job
        run: databricks bundle run crypto_market_analysis_job -t dev
