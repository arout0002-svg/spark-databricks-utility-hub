name: Deploy to Databricks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
      DATABRICKS_JAR_URI: ${{ secrets.DATABRICKS_JAR_URI }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify Databricks CLI
        run: databricks version

      - name: Validate and normalize Databricks host
        run: |
          python - <<'PY'
          import hashlib
          import os
          import sys

          host = os.getenv("DATABRICKS_HOST", "").strip()
          if not host:
              print("DATABRICKS_HOST is not set. Configure repository secret DATABRICKS_HOST.")
              sys.exit(1)

          if "${" in host or "env." in host:
              print("DATABRICKS_HOST looks like a placeholder. Set it to the real workspace URL.")
              sys.exit(1)

          if not host.startswith("https://"):
              host = f"https://{host}"

          host_hash = hashlib.sha256(host.encode("utf-8")).hexdigest()[:12]
          print(f"Using DATABRICKS_HOST hash: {host_hash}")

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as fh:
              fh.write(f"DATABRICKS_HOST={host}\n")
          PY

      - name: Configure Databricks CLI profile
        run: |
          mkdir -p "${HOME}"
          cat > "${HOME}/.databrickscfg" <<EOF
          [ci]
          host = ${DATABRICKS_HOST}
          token = ${DATABRICKS_TOKEN}
          EOF

      - name: Resolve JAR destination
        run: |
          JAR_URI="${DATABRICKS_JAR_URI:-dbfs:/tmp/project-utils.jar}"
          echo "JAR_URI=${JAR_URI}" >> "${GITHUB_ENV}"
          echo "Using JAR destination: ${JAR_URI}"

      - name: Build reusable JAR
        working-directory: jar-utils
        run: ./gradlew clean test build --no-daemon

      - name: Upload JAR to DBFS
        run: |
          if [[ "${JAR_URI}" == dbfs:/Volumes/* ]]; then
            databricks fs mkdir "${JAR_URI%/*}" --profile ci
          fi
          databricks fs cp jar-utils/build/libs/project-utils.jar "${JAR_URI}" --overwrite --profile ci

      - name: Validate Databricks bundle
        run: |
          databricks bundle validate -t dev --profile ci \
            --var "jar_path=${JAR_URI}" \
            --var "aws_access_key_id=${AWS_ACCESS_KEY_ID}" \
            --var "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"

      - name: Deploy Databricks bundle
        run: |
          databricks bundle deploy -t dev --profile ci \
            --var "jar_path=${JAR_URI}" \
            --var "aws_access_key_id=${AWS_ACCESS_KEY_ID}" \
            --var "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"

      - name: Run crypto market analysis job
        run: databricks bundle run crypto_market_analysis_job -t dev --profile ci --var "jar_path=${JAR_URI}"

      - name: Run S3 bronze ingest job
        run: |
          databricks bundle run s3_ingest_job -t dev --profile ci \
            --var "jar_path=${JAR_URI}" \
            --var "aws_access_key_id=${AWS_ACCESS_KEY_ID}" \
            --var "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"
