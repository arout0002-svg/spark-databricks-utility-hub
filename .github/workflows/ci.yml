name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff checks
        run: ruff check src tests

      - name: Run MyPy checks
        run: mypy src/common src/jobs tests

      - name: Run Python tests
        run: pytest -q

      - name: Build reusable JAR
        working-directory: jar-utils
        run: ./gradlew clean test build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-utils-jar
          path: jar-utils/build/libs/project-utils.jar

      - name: Upload test + config artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-project-artifacts
          path: |
            src/
            tests/
            databricks.yml
            bundle/
