resources:
  jobs:
    crypto_market_analysis_job:
      name: "${bundle.name}-${bundle.target}-crypto-market-analysis"
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            client: "2"
      tasks:
        - task_key: run_crypto_market_analysis
          environment_key: default
          spark_python_task:
            python_file: ../../src/jobs/crypto_market_analysis.py
            parameters:
              - "--config"
              - "../../src/configs/${bundle.target}.yaml"
          libraries:
            - jar: ${var.jar_path}

    etl_job:
      name: "${bundle.name}-${bundle.target}-etl-job"
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            client: "2"
      tasks:
        - task_key: run_etl_job
          environment_key: default
          spark_python_task:
            python_file: ../../src/jobs/etl_job.py
            parameters:
              - "--config"
              - "../../src/configs/${bundle.target}.yaml"
          libraries:
            - jar: ${var.jar_path}

    streaming_job:
      name: "${bundle.name}-${bundle.target}-streaming-job"
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            client: "2"
      tasks:
        - task_key: run_streaming_job
          environment_key: default
          spark_python_task:
            python_file: ../../src/jobs/streaming_job.py
            parameters:
              - "--config"
              - "../../src/configs/${bundle.target}.yaml"
          libraries:
            - jar: ${var.jar_path}
